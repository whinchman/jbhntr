# render.yaml — Render.com Infrastructure as Code
#
# Required environment variables (set in the Render dashboard under each
# service's "Environment" tab — do NOT commit secrets to this file):
#
#   ANTHROPIC_API_KEY   — Anthropic Console: https://console.anthropic.com
#   SERPAPI_KEY         — SerpAPI dashboard: https://serpapi.com/manage-api-key
#   SESSION_SECRET      — Random 32-byte string; run: openssl rand -hex 32
#   GOOGLE_CLIENT_ID    — Google Cloud Console → APIs & Services → Credentials
#   GOOGLE_CLIENT_SECRET
#   GITHUB_CLIENT_ID    — GitHub → Settings → Developer settings → OAuth Apps
#   GITHUB_CLIENT_SECRET
#
# Note: NTFY_TOPIC is no longer a global env var. Each user configures their
# own ntfy topic in the Settings page; it is stored in the database.
#
# After deploying, set base_url (in config.yaml or as an env var) to your
# Render web service URL (e.g. https://jobhuntr.onrender.com) so that OAuth
# redirect URIs resolve correctly.

services:
  - type: web
    name: jobhuntr
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntr-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

databases:
  - name: jobhuntr-db
    databaseName: jobhuntr
    plan: free
