services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobhuntr
      POSTGRES_USER: jobhuntr
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhuntr -d jobhuntr"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://jobhuntr:secret@db:5432/jobhuntr?sslmode=disable
    volumes:
      - ./output:/app/output
      - ./resume.md:/app/resume.md:ro
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
