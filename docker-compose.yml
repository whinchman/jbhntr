services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobhuntr
      POSTGRES_USER: jobhuntr
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhuntr -d jobhuntr"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: [prod]
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://jobhuntr:secret@db:5432/jobhuntr?sslmode=disable
    volumes:
      - ./output:/app/output
      - ./resume.md:/app/resume.md:ro
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://jobhuntr:secret@db:5432/jobhuntr?sslmode=disable
      PORT: "8080"
    volumes:
      - .:/workspace
      - go-mod-cache:/root/go/pkg/mod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace

volumes:
  pgdata:
  go-mod-cache:
