services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    volumes:
      - ..:/workspace
      - ${HOME}/.claude:/home/agent/.claude
      - ${HOME}/.claude.json:/home/agent/.claude.json
    env_file:
      - ../.env
    environment:
      - DISPLAY=:99
    working_dir: /workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${AGENT_MEMORY:-8G}
          cpus: "${AGENT_CPUS:-4}"
