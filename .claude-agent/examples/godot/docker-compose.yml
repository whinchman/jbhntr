services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        GODOT_VERSION: "4.6.1"
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    volumes:
      - .:/workspace
      - godot-cache:/home/godot/.local/share/godot
      - ${HOME}/.claude:/home/godot/.claude
      - ${HOME}/.claude.json:/home/godot/.claude.json
    environment:
      - DISPLAY=:99
    working_dir: /workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${AGENT_MEMORY:-8G}
          cpus: "${AGENT_CPUS:-4}"

volumes:
  godot-cache:
