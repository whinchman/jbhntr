project:
  name: "my-node-app"
  description: "A TypeScript/Node.js application"

git:
  default_branch: "main"
  feature_prefix: "feature/"
  commit_style: "conventional"

workflow:
  plans_dir: "plans"
  worktrees_dir: "worktrees"
  backlog_file: "TODO.md"
  done_file: "DONE.md"

testing:
  enabled: true
  command: "npm test"
  test_dir: "tests/"
  test_pattern: "*.test.ts"

build:
  command: "npm run build"

code_standards: |
  - TypeScript strict mode enabled
  - Source code in src/
  - Tests in tests/ using Jest or Vitest
  - ESLint + Prettier for formatting
  - No console.log in production code (use a logger)
  - Pin dependencies with package-lock.json
