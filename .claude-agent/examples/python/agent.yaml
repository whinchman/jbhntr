project:
  name: "my-python-app"
  description: "A Python application"

git:
  default_branch: "main"
  feature_prefix: "feature/"
  commit_style: "conventional"

workflow:
  plans_dir: "plans"
  worktrees_dir: "worktrees"
  backlog_file: "TODO.md"
  done_file: "DONE.md"

testing:
  enabled: true
  command: "pytest -v"
  test_dir: "tests/"
  test_pattern: "test_*.py"

build:
  command: ""

code_standards: |
  - Follow PEP 8
  - Type hints on all function signatures
  - Source code in src/
  - Tests in tests/ mirroring the src/ structure
  - Use virtual environments (python3 -m venv)
  - Pin dependencies in requirements.txt
