<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}JobHuntr{{end}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/app.css">
  {{if .CSRFToken}}
  <meta name="csrf-token" content="{{.CSRFToken}}">
  {{end}}
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var meta = document.querySelector('meta[name="csrf-token"]');
      if (meta) {
        document.body.setAttribute('hx-headers',
          JSON.stringify({"X-CSRF-Token": meta.content}));
      }
    });
  </script>
</head>
<body>
  <nav class="app-nav" aria-label="Main navigation">
    <div class="app-nav-inner">
      <a href="/" class="app-nav-brand"><strong>JobHuntr</strong></a>
      <div class="app-nav-links">
        <a href="/">Jobs</a>
        <a href="/settings">Settings</a>
        {{if .User}}
        <a href="/profile">Profile</a>
        {{end}}
      </div>
      {{if .User}}
      <div class="app-nav-user">
        {{if .User.AvatarURL}}
        <img src="{{.User.AvatarURL}}" alt="" class="nav-avatar">
        {{end}}
        {{.User.DisplayName}}
        &nbsp;·&nbsp;
        <a href="#" hx-post="/logout" hx-push-url="/login">Sign out</a>
      </div>
      {{else}}
      <div class="app-nav-user">
        <a href="/login">Sign in</a>
      </div>
      {{end}}
    </div>
  </nav>
  <main class="app-container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
