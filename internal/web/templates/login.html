{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobHuntr — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-page">
  <article class="login-card">
    <header class="login-card-header">
      <h1>JobHuntr</h1>
      <p>Sign in to manage your job search</p>
    </header>

    {{if .Flash}}
    <div class="alert alert-danger" role="alert">{{.Flash}}</div>
    {{end}}
    {{if .FlashSuccess}}
    <div class="alert alert-success" role="alert">{{.FlashSuccess}}</div>
    {{end}}

    <form method="post" action="/login">
      <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">

      <label for="email">
        Email address
        <input id="email" type="email" name="email" autocomplete="email"
               placeholder="you@example.com" required autofocus
               value="{{.Email}}"
               {{if .Flash}}aria-invalid="true"{{end}}>
      </label>

      <label for="password">
        Password
        <span class="login-forgot-link">
          <a href="/forgot-password">Forgot password?</a>
        </span>
        <input id="password" type="password" name="password" autocomplete="current-password"
               placeholder="••••••••" required
               {{if .Flash}}aria-invalid="true"{{end}}>
      </label>

      <button type="submit">Sign in</button>
    </form>

    {{if .Providers}}
    <div class="login-divider"><span>or</span></div>
    {{range .Providers}}
    <a href="/auth/{{.}}" role="button" class="outline">Continue with {{.}}</a>
    {{end}}
    {{end}}

    <footer class="login-card-footer">
      <p>Don't have an account? <a href="/register">Create one</a></p>
    </footer>
  </article>
</body>
</html>
{{end}}
