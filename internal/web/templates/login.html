<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobHuntr — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { max-width: 400px; width: 100%; text-align: center; }
    .login-card h1 { margin-bottom: 0.5rem; }
    .login-card p { margin-bottom: 2rem; color: #666; }
    .provider-btn { display: block; width: 100%; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>JobHuntr</h1>
    <p>Sign in to manage your job search</p>
    <a href="/auth/google" role="button" class="provider-btn">Sign in with Google</a>
    <a href="/auth/github" role="button" class="provider-btn outline">Sign in with GitHub</a>
  </div>
</body>
</html>
