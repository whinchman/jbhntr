<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobHuntr — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-page">
  <article class="login-card">
    <header class="login-card-header">
      <h1>JobHuntr</h1>
      <p>Sign in to manage your job search</p>
    </header>

    {{if .Flash}}
    <div role="alert" class="alert alert-info">
      <p>{{.Flash}}</p>
    </div>
    {{end}}

    <div class="providers-section">
      {{range .Providers}}
        {{if eq . "google"}}
          <a href="/auth/google" role="button" class="provider-btn provider-btn-google"
             onclick="this.setAttribute('aria-busy','true'); this.setAttribute('aria-label','Signing in with Google\u2026');">
            Sign in with Google
          </a>
        {{end}}
        {{if eq . "github"}}
          <a href="/auth/github" role="button" class="provider-btn provider-btn-github"
             onclick="this.setAttribute('aria-busy','true'); this.setAttribute('aria-label','Signing in with GitHub\u2026');">
            Sign in with GitHub
          </a>
        {{end}}
      {{end}}
      {{if eq (len .Providers) 0}}
        <p><em>No OAuth providers are configured.</em></p>
      {{end}}
    </div>
  </article>
</body>
</html>
