{{define "forgot_password.html"}}
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Forgot Password</title></head>
<body>
<h1>Forgot Password</h1>
{{if .Flash}}<p class="info">{{.Flash}}</p>{{end}}
{{if .Sent}}
<p>If an account with that email exists, a reset link has been sent.</p>
{{else}}
<form method="POST" action="/forgot-password">
  <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
  <label>Email: <input type="email" name="email" value="{{.Form.Email}}"></label><br>
  <button type="submit">Send Reset Link</button>
</form>
{{end}}
</body>
</html>
{{end}}
