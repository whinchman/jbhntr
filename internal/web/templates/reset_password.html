{{define "reset_password.html"}}
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Reset Password</title></head>
<body>
<h1>Reset Password</h1>
{{if .Flash}}<p class="error">{{.Flash}}</p>{{end}}
{{if .TokenValid}}
<form method="POST" action="/reset-password">
  <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
  <input type="hidden" name="token" value="{{.Token}}">
  <label>New Password: <input type="password" name="password"></label><br>
  <button type="submit">Reset Password</button>
</form>
{{else}}
<p>This reset link is invalid or has expired. <a href="/forgot-password">Request a new one</a>.</p>
{{end}}
</body>
</html>
{{end}}
